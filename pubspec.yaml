name: movie_discovery
description: "Movie Discovery App — Platform Commons Engineering Assignment"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Local Database
  drift: ^2.20.3
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Background Sync
  workmanager: ^0.6.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_native_splash: ^2.4.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.3
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  image: assets/icons/app_icon.png
  image_dark: assets/icons/app_icon.png
  android_12:
    image: assets/icons/app_icon.png
    icon_background_color: "#000000"
    color: "#000000"
    color_dark: "#000000"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/svg/
    - assets/fonts/
